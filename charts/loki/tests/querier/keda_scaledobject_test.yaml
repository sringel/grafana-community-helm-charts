suite: querier KEDA ScaledObject
templates:
  - querier/so.yaml

tests:
  - it: should not render ScaledObject when kedaAutoscaling is disabled
    set:
      deploymentMode: Distributed
      loki.commonConfig.replication_factor: 1
      loki.useTestSchema: true
      querier.kedaAutoscaling.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should not render ScaledObject in non-distributed mode
    set:
      deploymentMode: SimpleScalable
      loki.commonConfig.replication_factor: 1
      loki.useTestSchema: true
      querier.kedaAutoscaling.enabled: true
    asserts:
      - hasDocuments:
          count: 0

  - it: should render ScaledObject when kedaAutoscaling is enabled in distributed mode
    set:
      deploymentMode: Distributed
      loki.commonConfig.replication_factor: 1
      loki.useTestSchema: true
      defaults.kedaAutoscaling.prometheusAddress: http://prometheus:9090
      querier.kedaAutoscaling.enabled: true
      querier.kedaAutoscaling.minReplicas: 2
      querier.kedaAutoscaling.maxReplicas: 10
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ScaledObject
      - equal:
          path: spec.minReplicaCount
          value: 2
      - equal:
          path: spec.maxReplicaCount
          value: 10
      - equal:
          path: spec.cooldownPeriod
          value: 300
      - equal:
          path: spec.pollingInterval
          value: 30
      - equal:
          path: spec.scaleTargetRef.kind
          value: Deployment

  - it: should include customHeaders in default Prometheus trigger
    set:
      deploymentMode: Distributed
      loki.commonConfig.replication_factor: 1
      loki.useTestSchema: true
      defaults.kedaAutoscaling.prometheusAddress: http://prometheus:9090
      defaults.kedaAutoscaling.customHeaders: X-Scope-OrgID=tenant1
      querier.kedaAutoscaling.enabled: true
    asserts:
      - hasDocuments:
          count: 1
      - matchRegex:
          path: spec.triggers[0].metadata.customHeaders
          pattern: X-Scope-OrgID=tenant1

  - it: should include fallback configuration
    set:
      deploymentMode: Distributed
      loki.commonConfig.replication_factor: 1
      loki.useTestSchema: true
      defaults.kedaAutoscaling.prometheusAddress: http://prometheus:9090
      querier.kedaAutoscaling.enabled: true
      querier.kedaAutoscaling.fallback:
        failureThreshold: 3
        replicas: 2
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: spec.fallback.failureThreshold
          value: 3
      - equal:
          path: spec.fallback.replicas
          value: 2

  - it: should include behavior configuration
    set:
      deploymentMode: Distributed
      loki.commonConfig.replication_factor: 1
      loki.useTestSchema: true
      defaults.kedaAutoscaling.prometheusAddress: http://prometheus:9090
      querier.kedaAutoscaling.enabled: true
      querier.kedaAutoscaling.behavior:
        scaleDown:
          stabilizationWindowSeconds: 300
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: spec.advanced.horizontalPodAutoscalerConfig.behavior.scaleDown.stabilizationWindowSeconds
          value: 300

  - it: should use component pollingInterval when it is an integer
    set:
      deploymentMode: Distributed
      loki.commonConfig.replication_factor: 1
      loki.useTestSchema: true
      defaults.kedaAutoscaling.prometheusAddress: http://prometheus:9090
      querier.kedaAutoscaling.enabled: true
      querier.kedaAutoscaling.pollingInterval: 15
    asserts:
      - equal:
          path: spec.pollingInterval
          value: 15

  - it: should fallback to default pollingInterval when value is not an integer
    set:
      deploymentMode: Distributed
      loki.commonConfig.replication_factor: 1
      loki.useTestSchema: true
      defaults.kedaAutoscaling.prometheusAddress: http://prometheus:9090
      defaults.kedaAutoscaling.pollingInterval: 30
      querier.kedaAutoscaling.enabled: true
      querier.kedaAutoscaling.pollingInterval: "15ab" # string, not int
    asserts:
      - equal:
          path: spec.pollingInterval
          value: 30
