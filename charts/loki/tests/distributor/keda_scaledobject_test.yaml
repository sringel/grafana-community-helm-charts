suite: distributor KEDA ScaledObject
templates:
  - distributor/so.yaml

tests:
  - it: should not render ScaledObject when kedaAutoscaling is disabled
    set:
      deploymentMode: Distributed
      loki.commonConfig.replication_factor: 1
      loki.useTestSchema: true
      distributor.kedaAutoscaling.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should not render ScaledObject in non-distributed mode
    set:
      deploymentMode: SimpleScalable
      loki.commonConfig.replication_factor: 1
      loki.useTestSchema: true
      distributor.kedaAutoscaling.enabled: true
      distributor.kedaAutoscaling.triggers:
        - type: prometheus
          name: test
          metadata:
            query: test
            threshold: "1"
    asserts:
      - hasDocuments:
          count: 0

  - it: should render ScaledObject when kedaAutoscaling is enabled in distributed mode
    set:
      deploymentMode: Distributed
      loki.commonConfig.replication_factor: 1
      loki.useTestSchema: true
      defaults.kedaAutoscaling.prometheusAddress: http://prometheus:9090
      distributor.kedaAutoscaling.enabled: true
      distributor.kedaAutoscaling.minReplicas: 2
      distributor.kedaAutoscaling.maxReplicas: 10
      distributor.kedaAutoscaling.triggers:
        - type: prometheus
          name: distributor_metric
          metadata:
            serverAddress: http://prometheus:9090
            query: sum(rate(loki_distributor_bytes_received_total[2m]))
            threshold: "1000000"
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ScaledObject
      - equal:
          path: spec.minReplicaCount
          value: 2
      - equal:
          path: spec.maxReplicaCount
          value: 10
      - equal:
          path: spec.cooldownPeriod
          value: 300
      - equal:
          path: spec.pollingInterval
          value: 30
      - equal:
          path: spec.scaleTargetRef.kind
          value: Deployment

  - it: should use component pollingInterval when it is an integer
    set:
      deploymentMode: Distributed
      loki.commonConfig.replication_factor: 1
      loki.useTestSchema: true
      defaults.kedaAutoscaling.prometheusAddress: http://prometheus:9090
      distributor.kedaAutoscaling.enabled: true
      distributor.kedaAutoscaling.pollingInterval: 15
    asserts:
      - equal:
          path: spec.pollingInterval
          value: 15

  - it: should fallback to default pollingInterval when value is not an integer
    set:
      deploymentMode: Distributed
      loki.commonConfig.replication_factor: 1
      loki.useTestSchema: true
      defaults.kedaAutoscaling.prometheusAddress: http://prometheus:9090
      defaults.kedaAutoscaling.pollingInterval: 30
      distributor.kedaAutoscaling.enabled: true
      distributor.kedaAutoscaling.pollingInterval: "notAnInt" # not int
    asserts:
      - equal:
          path: spec.pollingInterval
          value: 30
