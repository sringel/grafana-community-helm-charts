{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "tempo.fullname" . }}
  labels:
    {{- include "tempo.labels" (dict "ctx" . "component" "gateway") | nindent 4 }}
    {{- with .Values.ingress.labels }}
    {{- toYaml . | nindent 4}}
    {{- end}}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  namespace: {{ .Release.Namespace }}
spec:
  {{- with .Values.ingress.ingressClassName }}
  ingressClassName: {{ tpl . $ }}
  {{- end -}}
  {{- with .Values.ingress.tls }}
  tls:
    {{- range . }}
    - hosts:
        {{- range .hosts }}
        - {{ tpl . $ | quote }}
        {{- end }}
      {{- with .secretName }}
      secretName: {{ tpl . $ }}
      {{- end }}
    {{- end }}
  {{- end }}
  rules:
    {{- range $.Values.ingress.hosts }}
    - host: {{ tpl . $ | quote }}
      http:
        paths:
          {{- range $svcName, $paths := $.Values.ingress.paths }}
            {{- range $paths }}
            {{- if and (eq .path "/v1/traces") (not $.Values.traces.otlp.http.enabled) }}
            {{- /* skip: /v1/traces requires the OTLP HTTP receiver, which is disabled */ -}}
            {{- else }}
          - path: {{ tpl .path $ }}
            pathType: {{ .pathType | default "Prefix" }}
            backend:
              service:
                name: {{ include "tempo.fullname" $ }}-{{ $svcName }}
                port:
                  number: {{ .port | default (printf "%s" (include "tempo.serverHttpListenPort" $ )) }}
            {{- end }}
            {{- end }}
          {{- end }}
    {{- end }}
{{- end }}
